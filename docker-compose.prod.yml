services:
  app:
    build: .
    container_name: assetlink-app
    restart: unless-stopped
    depends_on:
      - minio
    ports:
      - "${APP_PORT:-3010}:3000"
    environment:
      PORT: 3000
      API_TOKEN: ${API_TOKEN:-super-secret-token}
      MINIO_END_POINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-assetlink}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-assetlink-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-assetlink-images}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3010}

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: assetlink-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-assetlink}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-assetlink-secret}
    command: server /data --console-address ":9001"
    volumes:
      - assetlink-minio-data:/data

volumes:
  assetlink-minio-data:
